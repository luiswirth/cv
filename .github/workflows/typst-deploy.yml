name: Deploy Typst CV

on:
  push:
    branches: ["main"]
  workflow_dispatch:


permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Typst
        uses: typst-community/setup-typst@v3
      
      - name: Cache Fonts
        id: cache-fonts
        uses: actions/cache@v4
        with:
          path: fonts
          key: ${{ runner.os }}-newcm-fonts-v1

      - name: Download Fonts
        if: steps.cache-fonts.outputs.cache-hit != 'true'
        run: |
          mkdir fonts
          wget --timeout=15 --tries=5 -O fonts/NewCMSans10-Regular.otf https://mirrors.ctan.org/fonts/newcomputermodern/otf/NewCMSans10-Regular.otf
          wget --timeout=15 --tries=5 -O fonts/NewCMSans10-Bold.otf https://mirrors.ctan.org/fonts/newcomputermodern/otf/NewCMSans10-Bold.otf
          wget --timeout=15 --tries=5 -O fonts/NewCMSans10-Oblique.otf https://mirrors.ctan.org/fonts/newcomputermodern/otf/NewCMSans10-Oblique.otf

      - name: Compile Typst
        run: |
          mkdir public
          typst compile cv.typ public/cv.pdf --font-path fonts

      - name: Create Landing Page
        run: |
          echo '<!DOCTYPE html><meta http-equiv="refresh" content="0; url=cv.pdf">' > public/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
